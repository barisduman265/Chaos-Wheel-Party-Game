workflows:
  ios-build:
    name: iOS Build (no codesign)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up dependencies and CocoaPods
        script: |
          set -e
          flutter clean
          flutter pub get
          cd ios
          # Wipe any stale pod state so the sandbox matches a fresh Podfile.lock.
          rm -rf Pods Podfile.lock .symlinks Flutter/ephemeral
          pod repo update
          pod install
          cd ..
      - name: Build iOS (no codesign)
        script: |
          set -e
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app

  ios-appstore:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.skyroonlabs.chaoswheel
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up dependencies and CocoaPods
        script: |
          set -e
          flutter clean
          flutter pub get
          cd ios
          # Wipe any stale pod state so the sandbox matches a fresh Podfile.lock.
          rm -rf Pods Podfile.lock .symlinks Flutter/ephemeral
          pod repo update
          pod install
          cd ..
      - name: Set up code signing
        script: |
          set -e
          # Applies the distribution certificate + provisioning profile added
          # in Codemagic and writes /Users/builder/export_options.plist.
          xcode-project use-profiles
      - name: Build signed release IPA
        script: |
          set -e
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
